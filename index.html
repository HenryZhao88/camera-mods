<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CamMods — gesture VFX deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07080b;
        --panel: #0e1016;
        --card: #12141c;
        --line: #20242f;
        --line-soft: #181b24;
        --fg: #e7e9f0;
        --muted: #7c8295;
        --muted-dim: #545a6b;
        --accent: #7df9ff;
        --display: 'Chakra Petch', system-ui, sans-serif;
        --mono: 'IBM Plex Mono', ui-monospace, monospace;
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        background:
          radial-gradient(1200px 600px at 70% -10%, #11151f 0%, transparent 60%),
          var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* faint grid texture for the "control deck" feel */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--line-soft) 1px, transparent 1px),
          linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
        background-size: 44px 44px;
        opacity: 0.35;
        pointer-events: none;
        mask-image: radial-gradient(120% 100% at 50% 0%, #000 30%, transparent 90%);
      }

      #app {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 18px;
        height: 100vh;
        padding: 18px;
      }

      /* ---- stage / video ---- */
      #stage {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        background:
          repeating-linear-gradient(45deg, #0a0c11 0 12px, #090b0f 12px 24px);
        overflow: hidden;
      }
      #stage::after {
        content: 'CAMMODS';
        position: absolute;
        top: 14px;
        left: 16px;
        font-family: var(--display);
        font-weight: 700;
        letter-spacing: 0.32em;
        font-size: 12px;
        color: var(--muted-dim);
        pointer-events: none;
      }
      #view {
        max-width: 100%;
        max-height: 100%;
        display: block;
        border-radius: 6px;
        background: #000;
      }
      #idle {
        position: absolute;
        text-align: center;
        color: var(--muted);
        font-family: var(--display);
        letter-spacing: 0.08em;
      }
      #idle .big { font-size: 22px; color: var(--fg); margin-bottom: 6px; }

      /* ---- panel ---- */
      #panel {
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, var(--panel), #0b0d12);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }

      .panel-head {
        padding: 16px 18px 14px;
        border-bottom: 1px solid var(--line);
      }
      .panel-head h1 {
        margin: 0;
        font-family: var(--display);
        font-weight: 700;
        font-size: 19px;
        letter-spacing: 0.06em;
      }
      .panel-head h1 .spark { color: var(--accent); }
      .panel-head p {
        margin: 4px 0 0;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      .statusbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 18px;
        border-bottom: 1px solid var(--line);
        font-size: 11.5px;
        color: var(--muted);
        background: #0a0c11;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--muted-dim);
        box-shadow: 0 0 0 0 transparent;
      }
      .dot.live {
        background: #41e0a3;
        animation: pulse 1.6s ease-out infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(65,224,163,0.5); }
        70% { box-shadow: 0 0 0 7px rgba(65,224,163,0); }
        100% { box-shadow: 0 0 0 0 rgba(65,224,163,0); }
      }
      .statusbar .fps { margin-left: auto; color: var(--fg); }

      /* ---- cards ---- */
      .cards {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .cards::-webkit-scrollbar { width: 9px; }
      .cards::-webkit-scrollbar-thumb { background: #1c2029; border-radius: 9px; }

      .card {
        --c: var(--accent);
        position: relative;
        border: 1px solid var(--line);
        border-left: 3px solid color-mix(in srgb, var(--c) 55%, var(--line));
        border-radius: 10px;
        padding: 12px 13px;
        background: var(--card);
        transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
      }
      .card.active {
        border-color: var(--c);
        box-shadow: 0 0 0 1px var(--c), 0 0 22px -4px var(--c);
        transform: translateY(-1px);
      }
      .card .top {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 2px;
      }
      .card .icon { font-size: 17px; line-height: 1; filter: saturate(1.2); }
      .card .name {
        font-family: var(--display);
        font-weight: 600;
        font-size: 14.5px;
        letter-spacing: 0.04em;
        color: var(--fg);
      }
      .card .badge {
        margin-left: auto;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .card .badge.set { color: var(--c); border-color: color-mix(in srgb, var(--c) 45%, var(--line)); }
      .card .badge.auto { color: #8aa0ff; border-color: #2c3350; }
      .card .desc {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
        margin: 6px 0 10px;
      }
      .card .desc b { color: color-mix(in srgb, var(--c) 75%, var(--fg)); font-weight: 600; }

      .row { display: flex; gap: 8px; align-items: center; }
      .row + .row { margin-top: 9px; }

      button {
        font-family: var(--mono);
        font-size: 11.5px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: var(--fg);
        background: #191c25;
        border: 1px solid var(--line);
        padding: 7px 11px;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      button:hover { background: #222633; border-color: #2e3445; }
      button:active { transform: translateY(1px); }
      button.primary {
        background: color-mix(in srgb, var(--c) 16%, #191c25);
        border-color: color-mix(in srgb, var(--c) 45%, var(--line));
        color: color-mix(in srgb, var(--c) 80%, var(--fg));
      }
      button.primary:hover { background: color-mix(in srgb, var(--c) 26%, #191c25); }
      button.icon-btn { padding: 7px 9px; color: var(--muted); }
      button.icon-btn:hover { color: #ff8e8e; border-color: #5a2a2a; }
      button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      .sens {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-top: 10px;
        font-size: 10px;
        color: var(--muted-dim);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        height: 4px;
        border-radius: 3px;
        background: #23272f;
        outline: none;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--c);
        border: 2px solid #0b0d12;
        cursor: pointer;
        box-shadow: 0 0 8px -1px var(--c);
      }

      label.toggle {
        display: flex; align-items: center; gap: 8px;
        font-size: 11.5px; color: var(--muted); cursor: pointer;
        user-select: none;
      }
      label.toggle input { accent-color: #8aa0ff; width: 15px; height: 15px; }

      /* ---- global footer ---- */
      .globals {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 13px 14px;
        border-top: 1px solid var(--line);
        background: #0a0c11;
      }
      .globals .start { grid-column: 1 / -1; }
      button.start {
        --c: #41e0a3;
        font-family: var(--display);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.1em;
        padding: 11px;
      }
      button.danger:hover { color: #ff8e8e; border-color: #5a2a2a; }
      .hint {
        padding: 0 14px 13px;
        font-size: 10.5px;
        color: var(--muted-dim);
        background: #0a0c11;
        line-height: 1.5;
      }

      .hidden { display: none !important; }

      @media (max-width: 860px) {
        #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
        #panel { max-height: 46vh; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="view"></canvas>
        <div id="idle">
          <div class="big">no signal</div>
          <div>press start to wake the camera</div>
        </div>
      </div>
      <aside id="panel">
        <div class="panel-head">
          <h1>CAM<span class="spark">⚡</span>MODS</h1>
          <p>gesture VFX control deck</p>
        </div>
        <div class="statusbar" id="statusbar">
          <span class="dot" id="livedot"></span>
          <span id="state">idle</span>
          <span id="fps" class="fps"></span>
        </div>
        <div class="cards" id="cards"></div>
        <div class="globals" id="globals"></div>
        <div class="hint" id="hint"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
